<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- link for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Interactive Color Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h3>Interactive Color Picker <span><i class="fa-solid fa-eye-dropper"></i></span></h3>
    <label for="color">Choose a color : </label>
    <input type="color" id="colorInput" name="color">
    <div class="color-preview" id="colorDisplay">Color Preview</div>
    <h4>Color History <span><i class="fa-solid fa-clock-rotate-left"></i></span></h4>
    <div class="history"></div>
    <button>Clear History <i class="fa-solid fa-trash"></i></button>
    <script src="/Exercise_36 js/main.js"></script>
</body>
</html>
